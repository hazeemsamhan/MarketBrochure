        .global-add-btn {

        .seasons-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }

        function openAddSeasonPopup() {
            document.getElementById('seasonPopupOverlay').style.display = 'block';
            document.getElementById('seasonPopup').style.display = 'block';
            document.getElementById('newSeasonName').value = '';
            document.getElementById('newSeasonIcon').value = '🛍️';
        }

        function closeSeasonPopup() {
            document.getElementById('seasonPopupOverlay').style.display = 'none';
            document.getElementById('seasonPopup').style.display = 'none';
        }

        function createNewSeasonSubmit() {
            var rawName = document.getElementById('newSeasonName').value.trim();
            var rawIcon = document.getElementById('newSeasonIcon').value.trim() || "🛍️";
            if(!rawName) { alert('الرجاء إدخال اسم الموسم أولاً!'); return; }

            var cleanId = 'season_' + Date.now();

            database.ref('registered_seasons/' + cleanId).set(rawName)
            .then(() => database.ref('seasons_icons/' + cleanId).set(rawIcon))
            .then(() => {
                return database.ref('seasons/' + cleanId).set({
                    items: exactCorrectData,
                    meta: {
                        h_title: "ميني ماركت اللبن الغربي أبو هزيم",
                        h_sub: "وسط البلد - خلف المسجد الرئيسي",
                        h_badge: "وفرنا عليك التفكير.. " + rawName + " صارت بين ايديك .",
                        footer: "ميني ماركت اللبن الغربي - نتشرف بزيارتكم دائماً ونسعى لخدمتكم بأفضل العروض | العروض سارية حتى نفاد الكمية .",
                        fontSize: 9
                    }
                });
            })
            .then(() => { 
                closeSeasonPopup(); 
                window.location.href = 'Sales.html?season=' + cleanId; 
            })
            .catch(err => alert("حدث خطأ أثناء الاتصال بالسحابة وحفظ البيانات."));
        }

        function fetchAndRenderSeasons() {
            const grid = document.getElementById('seasonsGrid');
            
            Promise.all([
                database.ref('registered_seasons').once('value'),
                database.ref('seasons_icons').once('value')
            ]).then(([seasonsSnap, iconsSnap]) => {
                var seasonsList = seasonsSnap.val();
                var iconsList = iconsSnap.val() || {};

                if(!seasonsList) {
                    seasonsList = { 'weekly_offers': '📍 عروض العيد الكبرى (الافتراضية)' };
                    iconsList = { 'weekly_offers': '📍' };
                    database.ref('registered_seasons').set(seasonsList);
                    database.ref('seasons_icons').set(iconsList);
                }

                grid.innerHTML = '';

                Object.keys(seasonsList).forEach(id => {
                    var seasonName = seasonsList[id];
                    var seasonIcon = iconsList[id] || "🛍️";

                    var card = document.createElement('div');
                    card.className = 'season-card';
                    if (id === 'weekly_offers') card.classList.add('default-season');

                    card.innerHTML = `
                        <div class="card-icon">${seasonIcon}</div>
                        <div class="card-title">${seasonName}</div>
                        <div class="card-action-text">${id === 'weekly_offers' ? '⭐ عروض المتجر الشاملة' : 'اضغط للتعديل والطباعة 📝'}</div>
                    `;

                    card.onclick = function() {
                        window.location.href = 'Sales.html?season=' + id;
                    };

                    grid.appendChild(card);
                });
            }).catch(err => {
                grid.innerHTML = '<div class="loading-text" style="color:#ef4444">⚠️ فشل في جلب البيانات، يرجى التحقق من إعدادات الـ Config.</div>';
            });
        }

        window.addEventListener('DOMContentLoaded', fetchAndRenderSeasons);
